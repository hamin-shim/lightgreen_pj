<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Plantagotchi</title>
    <!-- Google Fonts (user-specified) -->
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Loading overlay -->
    <div id="loading" class="loading-overlay">
      <div class="logo-wrap">
        <h1 class="logo">Plantagotchi</h1>
        <div class="loading-text">LOADING..</div>
      </div>
    </div>

    <!-- Custom cursor element (uses assets/ref5.jpg if provided) -->
    <div id="customCursor" class="custom-cursor" aria-hidden="true"></div>

    <main class="page-root">
      <section class="center-stage">
        <div class="device-shell">
          <div class="device-top"></div>
          <div class="device-screen">
            <!-- Reference image (ref7.jpg) should be placed at assets/ref7.jpg -->
            <img id="petImage" src="assets/ref7.jpg" alt="Plantagotchi"/>
          </div>
          <div class="device-controls">
            <div class="d-pad">
              <div></div><div></div><div></div>
              <div></div>
            </div>
            <div class="buttons">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
        <div class="caption">Plantagotchi — a cute Y2K pixel pet</div>
      </section>
    </main>

      <!-- Main content sections -->
      <section id="homeSection" class="site-section home-section">
        <div class="section-inner">
          <div class="left">
            <div class="device-shell small">
              <div class="device-screen mini">
                <div class="glitch" id="glitchMini">
                  <img id="petMini" src="assets/ref7.jpg" alt="Plantagotchi"/>
                </div>
              </div>
            </div>
          </div>
          <div class="right">
            <h2 class="section-title">초록이와 함께</h2>
            <p id="statusText">오늘은 누군가의 시선을 기다리는 중이에요.</p>
            <div class="stats-grid">
              <div class="stat">
                <div class="label">함께 자란 시간</div>
                <div id="grownTime">0일 0시간</div>
              </div>
              <div class="stat">
                <div class="label">마지막 돌봄 이후</div>
                <div id="lastCare">0시간</div>
              </div>
              <div class="stat">
                <div class="label">오늘 받은 관심</div>
                <div id="todayCount">0개</div>
              </div>
              <div class="stat">
                <div class="label">남겨진 마음</div>
                <div id="totalMessages">0개</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="careSection" class="site-section care-section">
        <h3 class="section-title">돌봄 버튼</h3>
        <div class="care-grid">
          <button class="care-button" data-type="soil">흙 확인했어요</button>
          <button class="care-button" data-type="sunlight">햇빛 확인했어요</button>
          <button class="care-button" data-type="observe">잎을 관찰했어요</button>
          <button class="care-button" data-type="sparkle">새 변화를 발견했어요</button>
        </div>
        <div id="careLog" class="care-log"></div>
      </section>

      <section id="memorySection" class="site-section memory-section">
        <h3 class="section-title">응원 메시지</h3>
        <form id="messageForm" class="message-form">
          <textarea id="messageInput" maxlength="30" placeholder="오늘 식물에게 전할 말을 적어보세요 (30자)"></textarea>
          <button type="submit" class="submit-btn">마음을 남기기</button>
        </form>
        <div class="message-count">총 <span id="messageCount">0</span>개의 잎사귀 카드</div>
        <div id="messageList" class="message-list"></div>
      </section>

      <section id="growthSection" class="site-section growth-section">
        <h3 class="section-title">함께 자란 흔적</h3>
        <div id="growthFeed" class="growth-feed"></div>
      </section>

    <script src="script.js"></script>
  </body>
</html>
